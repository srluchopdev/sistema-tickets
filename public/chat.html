<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat en tiempo real</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #eef2f6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .chat {
      background: white;
      width: 100%;
      max-width: 480px;
      height: min(640px, 92vh);
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #2e7dd1;
      color: white;
      padding: 1rem 1.3rem;
      font-weight: 700;
    }
    .mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .msg {
      max-width: 80%;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      background: #f0f4f8;
      align-self: flex-start;
      font-size: 0.95rem;
    }
    .msg.mio { background: #d8ebff; align-self: flex-end; }
    .msg .meta { font-size: 0.72rem; color: #7a8a99; margin-bottom: 2px; }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 0.8rem;
      border-top: 1px solid #e3eaf1;
    }
    input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid #cdd8e2;
      border-radius: 10px;
      font-size: 1rem;
    }
    button {
      border: none;
      background: #2e7dd1;
      color: white;
      font-weight: 700;
      border-radius: 10px;
      padding: 0 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat">
    <header>💬 Chat en tiempo real (Socket.IO)</header>
    <div class="mensajes" id="mensajes"></div>
    <form id="form">
      <input id="texto" placeholder="Escribí un mensaje..." autocomplete="off" maxlength="300" />
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Pedimos un nombre al entrar (simple, para identificar los mensajes)
    const usuario = prompt('¿Cuál es tu nombre?') || 'Anónimo';

    const form = document.getElementById('form');
    const input = document.getElementById('texto');
    const cont = document.getElementById('mensajes');

    // Al enviar el formulario, emitimos el mensaje al servidor
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!input.value.trim()) return;
      socket.emit('chat:mensaje', { usuario, texto: input.value });
      input.value = '';
      input.focus();
    });

    // El servidor reenvía cada mensaje a TODOS los conectados
    socket.on('chat:mensaje', (m) => {
      const div = document.createElement('div');
      div.className = 'msg' + (m.usuario === usuario ? ' mio' : '');

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${m.usuario} · ${m.hora}`;

      const texto = document.createElement('div');
      texto.textContent = m.texto; // textContent evita inyección de HTML

      div.appendChild(meta);
      div.appendChild(texto);
      cont.appendChild(div);
      cont.scrollTop = cont.scrollHeight; // auto-scroll al último mensaje
    });
  </script>
</body>
</html>
